# Test-only datasource override.
#
# Each @SpringBootTest class here mocks a different service bean, so Spring builds
# a SEPARATE application context per class. They otherwise share the production
# datasource URL (jdbc:h2:mem:roombookingdb), and because an in-memory H2 database
# outlives a single context within the same JVM, the second context to load re-runs
# db/schema.sql against tables that already exist -> "table already exists" and a
# failed context load that poisons the shared context cache.
#
# Resolving ${random.uuid} per context gives every context its own fresh in-memory
# database, so schema.sql + data.sql run cleanly once per context, fully isolated.
spring.datasource.url=jdbc:h2:mem:rb-test-${random.uuid};DB_CLOSE_DELAY=-1
