# Testcontainers injects the real JDBC URL via @DynamicPropertySource in
# AbstractIntegrationTest before any ApplicationContext is created, so no
# datasource URL override is needed here.
#
# What this file still does:
#   - disables the H2 console (no longer relevant, kept for safety)
#   - suppresses the open-in-view warning in test output
spring.jpa.open-in-view=false
