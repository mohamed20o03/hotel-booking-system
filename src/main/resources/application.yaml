spring:
  application:
    name: HotelBookingSystem
    security:
      jwt:
        secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
        expiration: ${JWT_EXPIRATION:86400000} # 1 day in milliseconds
  profiles:
    active: dev # Default to dev profile
  config:
    import: optional:file:.env[.properties]

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  rate-limit:
    auth:
      max-attempts: ${RATE_LIMIT_AUTH_MAX:10}
      window-seconds: ${RATE_LIMIT_AUTH_WINDOW:60}
